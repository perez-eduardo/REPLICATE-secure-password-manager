name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, backend-ec2-replicate]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify backend folder exists
        run: |
          test -f backend/package.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build backend if needed
        working-directory: backend
        run: |
          npm run build --if-present

      - name: Restart backend service
        run: |
          sudo systemctl restart secure-password-manager-backend

      - name: Verify backend service is running
        run: |
          sudo systemctl is-active secure-password-manager-backend
